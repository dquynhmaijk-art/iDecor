<main>


<section class="account-section">

    <div class="account-card">

        <h1 class="account-title">
            Đổi Mật Khẩu
        </h1>

        <p class="account-subtitle">
            Vì lý do bảo mật, vui lòng thay đổi mật khẩu trước khi tiếp tục sử dụng hệ thống.
        </p>

        <form
            id="changePasswordForm"
            class="account-form"
        >

            <input
                type="password"
                id="currentPassword"
                placeholder="Mật khẩu hiện tại"
                required
            >

            <input
                type="password"
                id="newPassword"
                placeholder="Mật khẩu mới"
                required
            >

            <input
                type="password"
                id="confirmPassword"
                placeholder="Nhập lại mật khẩu mới"
                required
            >

            <button
                type="submit"
                class="btn btn-gold"
            >
                Cập Nhật Mật Khẩu
            </button>

            <p class="account-text">
                Mật khẩu phải có ít nhất 8 ký tự, gồm chữ hoa, chữ thường, số và ký tự đặc biệt.
            </p>

            <p
                id="changePasswordMessage"
                class="form-message"
            ></p>

        </form>

    </div>

</section>


</main>
