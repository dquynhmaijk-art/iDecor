
<section class="account-section">

    <div class="account-card">

        <h1 class="account-title">
            Đặt Lại Mật Khẩu
        </h1>

        <p class="account-subtitle">
            Vui lòng nhập đầy đủ thông tin đã đăng ký để nhận mật khẩu tạm thời qua email.
        </p>

        <form
            id="resetForm"
            class="account-form"
        >

            <input
                type="text"
                id="fullName"
                placeholder="Họ và tên"
                required
            >

            <input
                type="tel"
                id="phone"
                placeholder="Số điện thoại"
                required
            >

            <input
                type="email"
                id="email"
                placeholder="Email đã đăng ký"
                required
            >

            <button
                type="submit"
                class="btn btn-gold"
            >
                Gửi Yêu Cầu
            </button>

            <p class="account-text">

                <a href="#/dang-nhap">
                    Quay lại đăng nhập
                </a>

            </p>

            <p
                id="resetMessage"
                class="form-message"
            ></p>

        </form>

    </div>

</section>
