
<section class="account-section">

    <div class="account-card">

        <h1 class="account-title">
            Đăng Ký Tài Khoản
        </h1>

        <p class="account-subtitle">
            Tạo tài khoản mới để sử dụng đầy đủ các tính năng của iDECOR.
        </p>

        <form
            id="registerForm"
            class="account-form"
        >

            <input
                type="text"
                id="fullName"
                placeholder="Họ và tên"
                required
            >

            <input
                type="tel"
                id="phone"
                placeholder="Số điện thoại"
                required
            >

            <input
                type="email"
                id="email"
                placeholder="Email"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Mật khẩu"
                required
            >

            <input
                type="password"
                id="confirmPassword"
                placeholder="Nhập lại mật khẩu"
                required
            >

            <button
                type="submit"
                class="btn btn-gold"
            >
                Đăng Ký
            </button>

            <p class="account-text">

                Đã có tài khoản?

                <a href="#/dang-nhap">
                    Đăng nhập
                </a>

            </p>

            <p
                id="registerMessage"
                class="form-message"
            ></p>

        </form>

    </div>

</section>
