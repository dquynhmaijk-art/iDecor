
<section class="account-section">

    <div class="account-card">

        <h1 class="account-title">
            Đăng Nhập
        </h1>

        <p class="account-subtitle">
            Đăng nhập để quản lý đơn hàng và thông tin tài khoản.
        </p>

        <form
            id="loginForm"
            class="account-form"
        >

            <input
                type="email"
                id="username"
                placeholder="Email"
                required
            >

            <input
                type="password"
                id="loginPassword"
                placeholder="Mật khẩu"
                required
            >

            <button
                type="submit"
                class="btn btn-gold"
            >
                Đăng Nhập
            </button>

            <div class="account-links">

                <a href="#/reset-mk">
                    Quên mật khẩu?
                </a>

            </div>

            <p class="account-text">

                Chưa có tài khoản?

                <a href="#/dang-ky">
                    Đăng ký ngay
                </a>

            </p>

            <p
                id="loginMessage"
                class="form-message"
            ></p>

        </form>

    </div>

</section>
