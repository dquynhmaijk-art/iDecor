<main class="product-detail-page">


<div class="container">

    <!-- Breadcrumb -->

    <div class="breadcrumb">

        <a href="#/trang-chu">
            Trang chủ
        </a>

        <span>/</span>

        <a href="#/san-pham">
            Sản phẩm
        </a>

        <span>/</span>

        <span id="product-category">
            Danh mục
        </span>

    </div>

    <!-- Thông tin sản phẩm -->

    <section class="product-detail">

        <!-- Ảnh -->

        <div class="product-gallery">

            <img
                id="product-image"
                src=""
                alt="Sản phẩm"
            >

        </div>

        <!-- Nội dung -->

        <div class="product-info">

            <h1 id="product-name">
                Tên sản phẩm
            </h1>

            <div class="product-rating">

                ★★★★★

                <span>
                    4.9/5
                </span>

            </div>

            <div
                id="product-price"
                class="product-price"
            >
                0 VNĐ
            </div>

            <p
                id="product-short-desc"
                class="product-short-desc"
            >
                Mô tả sản phẩm
            </p>

            <!-- Số lượng -->

            <div class="product-quantity">

                <button
                    type="button"
                    id="minus-btn"
                >
                    -
                </button>

                <input
                    type="number"
                    id="quantity"
                    value="1"
                    min="1"
                >

                <button
                    type="button"
                    id="plus-btn"
                >
                    +
                </button>

            </div>

            <!-- Nút -->

            <div class="product-actions">

                <button
                    id="add-cart-btn"
                    class="btn"
                >
                    Thêm vào giỏ hàng
                </button>

                <button
                    id="buy-now-btn"
                    class="btn btn-gold"
                >
                    Mua ngay
                </button>

            </div>

        </div>

    </section>

    <!-- Mô tả -->

    <section class="detail-section">

        <h2>
            Mô Tả Chi Tiết
        </h2>

        <div
            id="product-description"
            class="product-description"
        >
        </div>

    </section>

    <!-- Thông số -->

    <section class="detail-section">

        <h2>
            Thông Số Sản Phẩm
        </h2>

        <table class="spec-table">

            <tr>

                <td>
                    Mã sản phẩm
                </td>

                <td id="spec-code">
                </td>

            </tr>

            <tr>

                <td>
                    Danh mục
                </td>

                <td id="spec-category">
                </td>

            </tr>

            <tr>

                <td>
                    Tồn kho
                </td>

                <td id="spec-stock">
                </td>

            </tr>

        </table>

    </section>

    <!-- Sản phẩm liên quan -->

    <section class="related-products">

        <h2>
            Sản Phẩm Liên Quan
        </h2>

        <div
            id="related-products"
            class="related-grid"
        >

            <!-- JS render -->

        </div>

    </section>

</div>


</main>
